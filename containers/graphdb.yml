services:
  graphdb:
    image: ontotext/graphdb:10.8.4
    ports:
      - "7200:7200"
    volumes:
      - graphdb-data:/opt/graphdb/home
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7200/rest/repositories"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  graphdb-data:
