services:
  front:
    build:
      context: ../
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    environment:
      # Resolved from the browser — must be localhost URLs
      VITE_API_BASE_HOST: http://localhost:8080/api
      VITE_OIDC_ISSUER: http://localhost:8180/realms/bauhaus
      VITE_OIDC_CLIENT_ID: bauhaus-client
      VITE_API_MODE: server
    depends_on:
      - api
